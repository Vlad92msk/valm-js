<svg viewBox="0 20 220 178" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Segment gradients — coords match squished node positions -->
    <!-- cam(43,55) → mic(158,69) -->
    <linearGradient id="g-cam-mic" x1="43" y1="55" x2="158" y2="69" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- mic(158,69) → rec(177,165) -->
    <linearGradient id="g-mic-rec" x1="158" y1="69" x2="177" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <!-- rec(177,165) → screen(62,151) -->
    <linearGradient id="g-rec-screen" x1="177" y1="165" x2="62" y2="151" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <!-- screen(62,151) → cam(43,55) -->
    <linearGradient id="g-screen-cam" x1="62" y1="151" x2="43" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- Node fills -->
    <linearGradient id="camFill"    x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="micFill"    x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="screenFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="recFill"    x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- ─── Ring only (squished vertically) ──────────────────────────── -->
  <g transform="translate(110,110) scale(1,0.85) translate(-110,-110)">
    <path d="M 58,58 A 40,40 0 0 1 86,46 L 110,46 A 64,64 0 0 1 155,65"
          stroke="url(#g-cam-mic)"    stroke-width="18" stroke-linecap="round"/>
    <path d="M 155,65 A 64,64 0 0 1 174,110 L 174,134 A 40,40 0 0 1 162,162"
          stroke="url(#g-mic-rec)"    stroke-width="18" stroke-linecap="round"/>
    <path d="M 162,162 A 40,40 0 0 1 134,174 L 110,174 A 64,64 0 0 1 65,155"
          stroke="url(#g-rec-screen)" stroke-width="18" stroke-linecap="round"/>
    <path d="M 65,155 A 64,64 0 0 1 46,110 L 46,86 A 40,40 0 0 1 58,58"
          stroke="url(#g-screen-cam)" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- ─── Nodes (not squished, Y recalculated: 110 + (old_y−110)×0.85) ── -->

  <!-- Camera: (43,55) -->
  <circle cx="43" cy="55" r="34" fill="#2563EB" filter="url(#nodeShadow)"/>
  <circle cx="43" cy="55" r="34" fill="url(#camFill)"/>
  <g transform="translate(47,56)" fill="white">
    <rect x="-17" y="-10" width="25" height="20" rx="5.5"/>
    <circle cx="-6" cy="-1" r="4.8" fill="#2563EB"/>
    <circle cx="-6" cy="-1" r="1.6" fill="white" opacity="0.6"/>
  </g>

  <!-- Mic: old(158,62) → new(158,69) -->
  <circle cx="158" cy="69" r="34" fill="#7C3AED" filter="url(#nodeShadow)"/>
  <circle cx="158" cy="69" r="34" fill="url(#micFill)"/>
  <g transform="translate(158,64)" stroke="white" fill="none">
    <rect x="-4.5" y="-9" width="9" height="16" rx="4.5" fill="white" stroke="none"/>
    <path d="M -9,3 Q -9,13 0,13 Q 9,13 9,3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="13" x2="0"  y2="18" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="18" x2="5" y2="18" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Screen: old(62,158) → new(62,151) -->
  <circle cx="62" cy="151" r="34" fill="#0D9488" filter="url(#nodeShadow)"/>
  <circle cx="62" cy="151" r="34" fill="url(#screenFill)"/>
  <g transform="translate(62,151)" fill="white">
    <rect x="-13" y="-10" width="26" height="18" rx="2.5"/>
    <rect x="-11" y="-8"  width="22" height="14" rx="1.5" fill="#0D9488"/>
    <polygon points="-3,-5 -3,5 6,0" fill="white"/>
    <rect x="-1.5" y="8"  width="3"  height="4"/>
    <rect x="-6"   y="12" width="12" height="2.5" rx="1.25"/>
  </g>

  <!-- Record: (177,165) -->
  <circle cx="177" cy="165" r="34" fill="#6D28D9" filter="url(#nodeShadow)"/>
  <circle cx="177" cy="165" r="34" fill="url(#recFill)"/>
  <g transform="translate(177,165)">
    <circle r="13" stroke="white" stroke-width="2.5"/>
    <circle r="7"  fill="#EF4444"/>
  </g>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Handle -->
  <rect x="42" y="22" width="14" height="56" rx="7" transform="rotate(45, 50, 50)" fill="url(#g)"/>

  <!-- Head -->
  <circle cx="76" cy="24" r="20" fill="url(#g)"/>

  <!-- Camera lens: ring + dot -->
  <circle cx="76" cy="24" r="11" stroke="white" stroke-width="3" opacity="0.65"/>
  <circle cx="76" cy="24" r="4"  fill="white" opacity="0.85"/>
</svg>
